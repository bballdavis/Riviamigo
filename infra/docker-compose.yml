services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: riviamigo
      POSTGRES_USER: riviamigo
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riviamigo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v1.0.0
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./garage-entrypoint.sh:/entrypoint.sh:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://riviamigo:devpassword@timescaledb:5432/riviamigo
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY: GKdeadbeef0000000000000000000000
      S3_SECRET_KEY: deadbeef0000000000000000000000000000000000000000000000000000cafe
      PORT: 3001
      ALLOWED_ORIGINS: http://localhost:3000
      RUST_LOG: riviamigo_api=info,tower_http=info
      # JWT_SECRET, JWT_PUBLIC_KEY, AGE_ENCRYPTION_KEY are intentionally omitted.
      # On first boot the API auto-generates an RSA-2048 keypair and age X25519 key
      # and stores them in the system_config table. Set these vars to override.
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescaledb_data:
  garage_meta:
  garage_data:
