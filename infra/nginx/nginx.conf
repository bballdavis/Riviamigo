# Riviamigo production nginx config
# Expects: upstream API on localhost:3001, static files served from /app/dist

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Logging — intentionally excludes Authorization and Sec-WebSocket-Protocol
    # headers. The WS auth uses bearer tokens in the subprotocol field; those
    # must not appear in access logs. The uri field contains only path+query
    # (no credentials), so this format is safe to retain long-term.
    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,'
        '"referrer":"$http_referer","ua":"$http_user_agent",'
        '"request_id":"$http_x_request_id","duration":$request_time}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;

    # Upstream API
    upstream riviamigo_api {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/riviamigo/fullchain.pem;
        ssl_certificate_key /etc/ssl/riviamigo/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Real IP from proxy — restrict to known upstream addresses
        real_ip_header X-Forwarded-For;
        set_real_ip_from 127.0.0.1/32;

        # Body size limit (API handles per-route, this is a hard outer limit)
        client_max_body_size 10m;

        # Security headers (belt-and-suspenders with what Axum sends)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        # Auth endpoints — strict rate limit
        location ~ ^/v1/auth/(login|register|refresh) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://riviamigo_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API endpoints
        location /v1/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass         http://riviamigo_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://riviamigo_api;
        }

        # SPA static files
        location / {
            root  /app/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Versioned assets (cache forever)
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            root    /app/dist;
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
