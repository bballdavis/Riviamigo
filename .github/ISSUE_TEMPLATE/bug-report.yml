name: Bug report
description: Report reproducible behavior that does not match the expected product behavior.
title: "bug: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Please remove secrets, tokens, credentials, production data, live telemetry, and precise vehicle locations before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it is a problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Riviamigo version or commit
      placeholder: 2026.07.0 or abc1234
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend or dashboard
        - Backend or API
        - Authentication or authorization
        - Ingestion or vehicle connection
        - Database, backup, or restore
        - Deployment or containers
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
      description: State what should happen and what happened instead.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Add sanitized logs, screenshots, or a minimal fixture. Never include secrets or identifying telemetry.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety review
      options:
        - label: I removed secrets, credentials, production data, live telemetry, and precise vehicle locations.
          required: true
