name: Clean expired development images

on:
  schedule:
    - cron: '23 7 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report candidates without deleting them
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [riviamigo-api, riviamigo-web]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select expired SHA-only versions
        id: candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate --slurp "/users/bballdavis/packages/container/${PACKAGE}/versions?per_page=100" > versions.json
          cutoff="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/select-expired-dev-image-versions.mjs "$cutoff" versions.json > candidates.txt
          echo "count=$(wc -l < candidates.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: Delete expired SHA-only versions
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run == false) && steps.candidates.outputs.count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ matrix.package }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r version_id; do
            [[ -z "$version_id" ]] && continue
            gh api --method DELETE "/users/bballdavis/packages/container/${PACKAGE}/versions/${version_id}"
          done < candidates.txt
      - name: Report dry-run candidates
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: cat candidates.txt
