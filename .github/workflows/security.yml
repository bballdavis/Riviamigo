name: PR Security

on:
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

env:
  PNPM_VERSION: '11.15.1'
  NODE_VERSION: '24.18.0'

jobs:
  security:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Cargo audit
        working-directory: apps/api
        shell: bash
        run: |
          # age 0.12.1 currently pulls the unmaintained proc-macro-error2 through
          # i18n-embed-fl. There is no stable replacement release yet. Expire
          # this narrow exception so it cannot silently become permanent.
          if [[ "$(date -u +%F)" > "2026-10-01" ]]; then
            echo "RUSTSEC-2026-0173 exception expired; upgrade age/i18n-embed-fl"
            exit 1
          fi
          cargo audit --deny warnings --ignore RUSTSEC-2026-0173
      - name: pnpm audit
        run: pnpm audit --prod --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Semgrep SAST
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/rust
            p/typescript
            p/react
            p/owasp-top-ten
            config/security/semgrep-rules.yml
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Semgrep SAST (fork-safe)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/rust
            p/typescript
            p/react
            p/owasp-top-ten
            config/security/semgrep-rules.yml
      - name: Build production image
        run: docker build -f compose/Dockerfile -t riviamigo:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: riviamigo:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
