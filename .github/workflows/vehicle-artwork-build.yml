name: Vehicle artwork build

on:
  pull_request:
    branches:
      - dev
    paths:
      - assets/vehicles_generated/**
      - scripts/build_vehicle_fallback_artwork.py
      - scripts/apply_vehicle_artwork_fallbacks.py
      - .github/workflows/vehicle-artwork-build.yml

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate normalized fallback artwork
        run: |
          python scripts/build_vehicle_fallback_artwork.py \
            --output apps/web/public/vehicle-images/fallbacks \
            --preview vehicle-artwork-build/contact-sheet.png

      - name: Apply shared fallback integration
        run: python scripts/apply_vehicle_artwork_fallbacks.py

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test fallback contract
        run: pnpm --filter @riviamigo/web test -- src/routes/__tests__/vehicle-artwork-fallback.test.tsx

      - name: Typecheck shared artwork seams
        run: |
          pnpm --filter @riviamigo/hooks typecheck
          pnpm --filter @riviamigo/dashboards typecheck

      - name: Build web application
        run: pnpm --filter @riviamigo/web build

      - name: Commit generated assets and integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/web/public/vehicle-images/fallbacks \
            apps/web/src/routes/health.tsx \
            apps/web/src/routes/__tests__/vehicle-artwork-fallback.test.tsx \
            packages/hooks/src/index.ts \
            packages/hooks/src/useVehicleArtwork.tsx \
            packages/hooks/src/vehicleArtworkFallback.ts \
            packages/dashboards/src/widgets/custom/OverviewVehicleWidget.tsx \
            packages/dashboards/src/widgets/custom/ChargingConnectionWidget.tsx \
            docs/branding.md
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "feat: wire normalized fallback vehicle artwork"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload normalized artwork preview
        uses: actions/upload-artifact@v4
        with:
          name: normalized-vehicle-artwork
          path: vehicle-artwork-build
          if-no-files-found: error
          retention-days: 3
