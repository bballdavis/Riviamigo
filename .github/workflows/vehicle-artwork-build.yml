name: Vehicle artwork build

on:
  pull_request:
    branches:
      - dev
    paths:
      - assets/vehicles_generated/**
      - apps/web/public/vehicle-images/fallbacks/**
      - apps/web/src/routes/health.tsx
      - apps/web/src/routes/__tests__/vehicle-artwork-fallback.test.tsx
      - packages/hooks/src/index.ts
      - packages/hooks/src/useVehicleArtwork.tsx
      - packages/hooks/src/vehicleArtworkFallback.ts
      - packages/dashboards/src/widgets/custom/OverviewVehicleWidget.tsx
      - packages/dashboards/src/widgets/custom/ChargingConnectionWidget.tsx
      - scripts/build_vehicle_fallback_artwork.py
      - docs/branding.md
      - .github/workflows/vehicle-artwork-build.yml

permissions:
  contents: write

concurrency:
  group: vehicle-artwork-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate normalized fallback artwork
        run: |
          python scripts/build_vehicle_fallback_artwork.py \
            --preview vehicle-artwork-build/contact-sheet.png
          python scripts/build_vehicle_fallback_artwork.py --check

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test fallback contract
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @riviamigo/web exec vitest run \
            src/routes/__tests__/vehicle-artwork-fallback.test.tsx \
            --reporter=verbose 2>&1 | tee vehicle-artwork-build/test.log

      - name: Typecheck shared artwork seams
        run: |
          pnpm --filter @riviamigo/hooks typecheck
          pnpm --filter @riviamigo/dashboards typecheck

      - name: Build web application
        run: pnpm --filter @riviamigo/web build

      - name: Commit generated artwork
        shell: bash
        run: |
          if git diff --quiet -- apps/web/public/vehicle-images/fallbacks; then
            echo "Generated artwork is already checked in."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/vehicle-images/fallbacks
          git commit -m "assets: add normalized R2S artwork"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Upload normalized artwork preview and validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-vehicle-artwork
          path: vehicle-artwork-build
          if-no-files-found: warn
          retention-days: 3
