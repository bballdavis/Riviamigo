name: Vehicle artwork build

on:
  pull_request:
    branches:
      - dev
    paths:
      - assets/vehicles_generated/**
      - apps/web/public/vehicle-images/fallbacks/**
      - apps/web/src/routes/health.tsx
      - apps/web/src/routes/__tests__/vehicle-artwork-fallback.test.tsx
      - packages/hooks/src/index.ts
      - packages/hooks/src/useVehicleArtwork.tsx
      - packages/hooks/src/vehicleArtworkFallback.ts
      - packages/dashboards/src/widgets/custom/OverviewVehicleWidget.tsx
      - packages/dashboards/src/widgets/custom/ChargingConnectionWidget.tsx
      - scripts/build_vehicle_fallback_artwork.py
      - docs/branding.md
      - .github/workflows/vehicle-artwork-build.yml

permissions:
  contents: read

concurrency:
  group: vehicle-artwork-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Inspect R2S source artwork
        run: |
          mkdir -p vehicle-artwork-build/r2s-inventory
          python - <<'PY'
          from pathlib import Path
          import json
          import shutil
          from PIL import Image, ImageDraw, ImageFont

          root = Path('assets/vehicles_generated')
          output = Path('vehicle-artwork-build/r2s-inventory')
          candidates = []
          for path in sorted(root.rglob('*')):
              if not path.is_file():
                  continue
              normalized = str(path.relative_to(root)).lower().replace('-', '').replace('_', '').replace(' ', '')
              if 'r2s' not in normalized:
                  continue
              try:
                  with Image.open(path) as image:
                      candidates.append({
                          'path': str(path),
                          'width': image.width,
                          'height': image.height,
                          'mode': image.mode,
                          'format': image.format,
                      })
              except Exception:
                  continue

          print(json.dumps(candidates, indent=2))
          (output / 'inventory.json').write_text(json.dumps(candidates, indent=2) + '\n')
          if not candidates:
              raise SystemExit('No R2S artwork candidates found')

          source_output = output / 'source'
          source_output.mkdir(parents=True, exist_ok=True)
          for item in candidates:
              shutil.copy2(item['path'], source_output / Path(item['path']).name)

          cell_w, cell_h = 560, 430
          cols = 2
          rows = (len(candidates) + cols - 1) // cols
          sheet = Image.new('RGB', (cols * cell_w, rows * cell_h), '#d7d7d7')
          draw = ImageDraw.Draw(sheet)
          font = ImageFont.load_default()
          for index, item in enumerate(candidates):
              x = (index % cols) * cell_w
              y = (index // cols) * cell_h
              with Image.open(item['path']).convert('RGBA') as image:
                  thumb = image.copy()
                  thumb.thumbnail((cell_w - 30, cell_h - 80), Image.Resampling.LANCZOS)
                  checker = Image.new('RGB', thumb.size, 'white')
                  checker_draw = ImageDraw.Draw(checker)
                  tile = 20
                  for cy in range(0, thumb.height, tile):
                      for cx in range(0, thumb.width, tile):
                          if (cx // tile + cy // tile) % 2:
                              checker_draw.rectangle((cx, cy, cx + tile - 1, cy + tile - 1), fill='#b8b8b8')
                  checker.paste(thumb, (0, 0), thumb)
                  px = x + (cell_w - thumb.width) // 2
                  py = y + 42 + (cell_h - 80 - thumb.height) // 2
                  sheet.paste(checker, (px, py))
              label = f"{item['path']}  {item['width']}x{item['height']} {item['mode']}"
              draw.text((x + 10, y + 12), label, fill='black', font=font)
          sheet.save(output / 'contact-sheet.png')
          PY

      - name: Verify checked-in fallback artwork
        run: python scripts/build_vehicle_fallback_artwork.py --check

      - name: Build review preview
        run: |
          python scripts/build_vehicle_fallback_artwork.py \
            --output vehicle-artwork-build/fallbacks \
            --preview vehicle-artwork-build/contact-sheet.png

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Test fallback contract
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @riviamigo/web exec vitest run \
            src/routes/__tests__/vehicle-artwork-fallback.test.tsx \
            --reporter=verbose 2>&1 | tee vehicle-artwork-build/test.log

      - name: Typecheck shared artwork seams
        run: |
          pnpm --filter @riviamigo/hooks typecheck
          pnpm --filter @riviamigo/dashboards typecheck

      - name: Build web application
        run: pnpm --filter @riviamigo/web build

      - name: Upload normalized artwork preview and validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-vehicle-artwork
          path: vehicle-artwork-build
          if-no-files-found: warn
          retention-days: 3
