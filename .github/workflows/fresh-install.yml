name: Fresh install acceptance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Verification path
        required: true
        default: production
        type: choice
        options: [production, dev]

permissions:
  contents: read

jobs:
  fresh-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run isolated acceptance
        run: |
          cp compose/.env.example fresh-install.env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgresql://riviamigo:fresh-install-password@timescaledb:5432/riviamigo|' fresh-install.env
          sed -i 's|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=fresh-install-password|' fresh-install.env
          sed -i 's|REDIS_PASSWORD=.*|REDIS_PASSWORD=fresh-install-redis-password|' fresh-install.env
          sed -i 's|ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://fresh-install.example.test|' fresh-install.env
          printf '\nJWT_SECRET=%s\nJWT_PUBLIC_KEY=%s\nAGE_ENCRYPTION_KEY=%s\n' "${{ secrets.FRESH_INSTALL_JWT_SECRET }}" "${{ secrets.FRESH_INSTALL_JWT_PUBLIC_KEY }}" "${{ secrets.FRESH_INSTALL_AGE_ENCRYPTION_KEY }}" >> fresh-install.env
          pnpm verify:fresh-install -- --mode "${{ inputs.mode }}" --production-env "$PWD/fresh-install.env"
