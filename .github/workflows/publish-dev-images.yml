name: Publish development images

on:
  workflow_run:
    workflows: [Quality, Frontend, Backend, Security, Runtime]
    branches: [dev]
    types: [completed]

env:
  REGISTRY: ghcr.io
  OWNER: bballdavis

concurrency:
  group: publish-dev-images-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify every release check for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REQUIRED_WORKFLOWS: Quality,Frontend,Backend,Security,Runtime
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?branch=dev&head_sha=${HEAD_SHA}&per_page=100")

          IFS=',' read -ra workflows <<< "$REQUIRED_WORKFLOWS"
          for workflow in "${workflows[@]}"; do
            conclusion=$(jq -r \
              --arg name "$workflow" \
              --arg sha "$HEAD_SHA" \
              '[.workflow_runs[] | select(.name == $name and .head_sha == $sha)] | sort_by(.run_number) | last | .conclusion // empty' \
              <<< "$runs")
            if [[ "$conclusion" != "success" ]]; then
              echo "${workflow} has not completed successfully for ${HEAD_SHA} (conclusion: ${conclusion:-pending})"
              exit 1
            fi
            echo "${workflow}: success"
          done
      - id: revision
        shell: bash
        run: echo "short_sha=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api:edge
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api:sha-${{ steps.revision.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api
          subject-digest: ${{ steps.api.outputs.digest }}
          push-to-registry: true
      - id: web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./compose/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web:edge
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web:sha-${{ steps.revision.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web
          subject-digest: ${{ steps.web.outputs.digest }}
          push-to-registry: true
