name: Publish pre-release images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Pre-release version, for example 2026.07.0-rc.1
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: bballdavis

concurrency:
  group: publish-prerelease-images-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate dev pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: dev
          fetch-depth: 0
      - id: version
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(0[1-9]|1[0-2])\.[0-9]+-(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "Pre-release versions must use YYYY.MM.PATCH-(alpha|beta|rc).N; received $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  api:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api:${{ needs.validate.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ needs.validate.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  web:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./compose/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web:${{ needs.validate.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ needs.validate.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-smoke:
    needs: [validate, api, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
      - name: Authenticate the pre-release smoke test to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Create an ephemeral production environment
        env:
          JWT_SECRET: ${{ secrets.FRESH_INSTALL_JWT_SECRET }}
          JWT_PUBLIC_KEY: ${{ secrets.FRESH_INSTALL_JWT_PUBLIC_KEY }}
          AGE_ENCRYPTION_KEY: ${{ secrets.FRESH_INSTALL_AGE_ENCRYPTION_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          cp compose/.env.example prerelease-smoke.env
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgresql://riviamigo:prerelease-smoke-password@timescaledb:5432/riviamigo|' prerelease-smoke.env
          sed -i 's|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=prerelease-smoke-password|' prerelease-smoke.env
          sed -i 's|REDIS_PASSWORD=.*|REDIS_PASSWORD=prerelease-smoke-redis-password|' prerelease-smoke.env
          sed -i 's|ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://prerelease-smoke.example.test|' prerelease-smoke.env
          printf '\nJWT_SECRET=%s\nJWT_PUBLIC_KEY=%s\nAGE_ENCRYPTION_KEY=%s\n' "$JWT_SECRET" "$JWT_PUBLIC_KEY" "$AGE_ENCRYPTION_KEY" >> prerelease-smoke.env
      - name: Exercise the published pre-release image stack
        run: node scripts/verify-fresh-install.mjs --mode production --production-env "$PWD/prerelease-smoke.env" --image-tag "${{ needs.validate.outputs.version }}"

  create-release:
    needs: [validate, api, web, release-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify published multi-architecture images
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-api@${{ needs.api.outputs.digest }}"
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo-web@${{ needs.web.outputs.digest }}"
      - name: Create digest lock and GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_SHA: ${{ needs.validate.outputs.source_sha }}
          API_DIGEST: ${{ needs.api.outputs.digest }}
          WEB_DIGEST: ${{ needs.web.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          cat > images.lock <<EOF
          ghcr.io/bballdavis/riviamigo-api@${API_DIGEST}
          ghcr.io/bballdavis/riviamigo-web@${WEB_DIGEST}
          EOF
          gh release create "$VERSION" images.lock#images.lock --target "$SOURCE_SHA" --title "$VERSION" --prerelease --generate-notes
