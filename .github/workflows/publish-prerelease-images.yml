name: Preview image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Pre-release version, for example 2026.07.0-rc.1
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: bballdavis

concurrency:
  group: publish-prerelease-image-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: dev
          fetch-depth: 0
      - id: version
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(0[1-9]|1[0-2])\.[0-9]+-(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "Pre-release versions must use YYYY.MM.PATCH-(alpha|beta|rc).N; received $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  image:
    name: Build image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./compose/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo:${{ needs.validate.outputs.version }}
          cache-from: type=gha,scope=riviamigo-container-image
          cache-to: type=gha,mode=max,scope=riviamigo-container-image
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ needs.validate.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-smoke:
    name: Smoke test
    needs: [validate, image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
      - name: Authenticate pre-release smoke test to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Create ephemeral production environment
        run: |
          smoke_env="$RUNNER_TEMP/prerelease-smoke.env"
          cp compose/.env.example "$smoke_env"
          sed -i 's|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=prerelease-smoke-password|' "$smoke_env"
          sed -i 's|REDIS_PASSWORD=.*|REDIS_PASSWORD=prerelease-smoke-redis-password|' "$smoke_env"
          sed -i 's|ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://prerelease-smoke.example.test|' "$smoke_env"
          echo "PRERELEASE_SMOKE_ENV=$smoke_env" >> "$GITHUB_ENV"
      - name: Exercise published pre-release image stack
        run: node scripts/verify-fresh-install.mjs --mode production --production-env "$PRERELEASE_SMOKE_ENV" --image-tag "${{ needs.validate.outputs.version }}"

  create-release:
    name: Create release
    needs: [validate, image, release-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify published multi-architecture image
        run: docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo@${{ needs.image.outputs.digest }}"
      - name: Create digest lock and GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_SHA: ${{ needs.validate.outputs.source_sha }}
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
        shell: bash
        run: |
          echo "ghcr.io/bballdavis/riviamigo@${IMAGE_DIGEST}" > images.lock
          gh release create "$VERSION" images.lock#images.lock --repo "$GITHUB_REPOSITORY" --target "$SOURCE_SHA" --title "$VERSION" --prerelease --generate-notes
