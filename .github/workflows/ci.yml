name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC

# Minimal permissions by default; individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: '11.5.1'
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: stable

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Reject generated state and duplicate lockfiles
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -E '(^|/)(\.codex|\.claude|node_modules|target|dist|coverage|\.turbo|\.playwright-cli)(/|$)|(^|/)package-lock\.json$' || true)
          if [[ -n "$forbidden" ]]; then
            echo "Generated or local-only files are tracked:"
            echo "$forbidden"
            exit 1
          fi
          echo "Repository hygiene check passed"

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · unit coverage · storybook · e2e)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @riviamigo/web exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Docs check
        run: pnpm docs:check

      - name: Dashboard default drift check
        run: pnpm dashboards:sync-defaults --check

      - name: Color-token guard
        # Enforces the mandatory CLAUDE.md rule: no hex literals, rgb(), or
        # arbitrary Tailwind palette classes (text-blue-*, bg-indigo-*, etc.)
        # in application code.  Token definition files (tokens/colors.ts,
        # globals.css) and test files are excluded.
        run: |
          set +e
          VIOLATIONS=$(grep -rn \
            --include="*.tsx" --include="*.ts" --include="*.css" \
            -E '#[0-9a-fA-F]{3,8}|rgb\(|rgba\(|text-(blue|indigo|sky|green|red|orange|yellow|slate|zinc|stone)-[0-9]+|bg-(blue|indigo|sky|green|red|orange|yellow|slate|zinc|stone)-[0-9]+' \
            apps/web/src packages/ui/src packages/dashboards/src packages/hooks/src \
            --exclude-dir=node_modules \
            | grep -v 'tokens/colors\.ts\|globals\.css\|\.test\.\|\.spec\.\|//.*#' \
            | grep -v 'getPropertyValue\|CHART_COLORS\|rm-map-route' \
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Color-token violations found — use design tokens instead of raw colors:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No color-token violations"

      - name: Unit tests with coverage
        # Coverage thresholds (statements/lines: 69, functions: 50, branches: 55) are
        # enforced via vite.config.ts — this step will fail if any threshold is breached.
        run: pnpm --filter @riviamigo/web test:coverage

      - name: Build Storybook
        run: pnpm turbo build-storybook

      - name: E2E
        run: pnpm turbo test:e2e

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: warn

      - name: Upload Storybook build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/ui/storybook-static
          if-no-files-found: warn

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (fmt · clippy · test · coverage)
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.26.3-pg16
        env:
          POSTGRES_DB: riviamigo
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riviamigo -d riviamigo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://riviamigo:devpassword@127.0.0.1:5432/riviamigo
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Format
        run: cargo fmt --all --check

      - name: Check sqlx offline metadata
        run: cargo sqlx prepare --check --workspace

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all -- --include-ignored

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --fail-under-lines 70

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/lcov.info
          if-no-files-found: warn

  # ── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security (dependency audit · secret scan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        working-directory: apps/api
        # --deny warnings: fails on security advisories (vulnerabilities, unsound code).
        # Unmaintained crates are logged but do not fail the build — they're frequent in
        # indirect dependencies and outside this project's control; escalate if a vuln
        # advisory is filed against the specific crate.
        run: cargo audit --deny warnings

      - name: pnpm audit
        run: pnpm install --frozen-lockfile && pnpm audit --prod --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep SAST
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/rust
            p/typescript
            p/react
            p/owasp-top-ten
            config/security/semgrep-rules.yml
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ── Docker Image Security ────────────────────────────────────────────────────
  docker-security:
    name: Docker image scan (Trivy)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t riviamigo-api:${{ github.sha }} ./apps/api
        continue-on-error: true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: 'riviamigo-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

  # ── DB smoke ─────────────────────────────────────────────────────────────────
  db-smoke:
    name: DB smoke (fresh migrate + health check)
    runs-on: ubuntu-latest
    needs: backend
    services:
      timescaledb:
        image: timescale/timescaledb:2.26.3-pg16
        env:
          POSTGRES_DB: riviamigo_smoke
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riviamigo -d riviamigo_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://riviamigo:devpassword@127.0.0.1:5432/riviamigo_smoke
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations on fresh DB
        run: cargo sqlx migrate run

      - name: Verify migration idempotency (re-run should no-op)
        run: cargo sqlx migrate run

      - name: Start API and probe health
        run: |
          REDIS_URL=redis://localhost:6379 cargo run &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health; then
              echo "Health check passed"
              kill $API_PID
              exit 0
            fi
            sleep 2
          done
          echo "Health check timed out"
          kill $API_PID
          exit 1

  container-build:
    name: Container build (production Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose and build deployable images
        env:
          DATABASE_URL: postgresql://riviamigo:ci-password@timescaledb:5432/riviamigo
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: ci-password
          REDIS_PASSWORD: ci-redis-password
          JWT_SECRET: ci-private-key
          JWT_PUBLIC_KEY: ci-public-key
          AGE_ENCRYPTION_KEY: AGE-SECRET-KEY-1CI
          ALLOWED_ORIGINS: https://ci.example.test
        run: |
          docker compose -f infra/docker-compose.prod.yml config --quiet
          docker compose -f infra/docker-compose.prod.yml build
