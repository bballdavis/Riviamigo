name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: '9'
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: stable

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · unit coverage · storybook · e2e)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @riviamigo/web exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Unit tests with coverage
        # Coverage thresholds (statements/functions/lines: 70, branches: 65) are
        # enforced via vite.config.ts — this step will fail if any threshold is breached.
        run: pnpm --filter @riviamigo/web test:coverage

      - name: Build Storybook
        run: pnpm turbo build-storybook

      - name: E2E
        run: pnpm turbo test:e2e

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: warn

      - name: Upload Storybook build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/ui/storybook-static
          if-no-files-found: warn

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (fmt · clippy · test · coverage)
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.16.1-pg16
        env:
          POSTGRES_DB: riviamigo
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riviamigo -d riviamigo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://riviamigo:devpassword@127.0.0.1:5432/riviamigo

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Format
        run: cargo fmt --all --check

      - name: Check sqlx offline metadata
        run: cargo sqlx prepare --check --workspace

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all -- --include-ignored

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --fail-under-lines 70

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/lcov.info
          if-no-files-found: warn

  # ── Security ────────────────────────────────────────────────────────────────
  security:
    name: Security (dependency audit · secret scan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        working-directory: apps/api
        run: cargo audit --deny warnings --deny unmaintained

      - name: pnpm audit
        run: pnpm install --frozen-lockfile && pnpm audit --prod --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/rust
            p/typescript
            p/react
            p/owasp-top-ten
            .semgrep/custom-rules.yml
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ── Docker Image Security ────────────────────────────────────────────────────
  docker-security:
    name: Docker image scan (Trivy)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t riviamigo-api:${{ github.sha }} ./apps/api
        continue-on-error: true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'riviamigo-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

  # ── DB smoke ─────────────────────────────────────────────────────────────────
  db-smoke:
    name: DB smoke (fresh migrate + health check)
    runs-on: ubuntu-latest
    needs: backend
    services:
      timescaledb:
        image: timescale/timescaledb:2.16.1-pg16
        env:
          POSTGRES_DB: riviamigo_smoke
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riviamigo -d riviamigo_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://riviamigo:devpassword@127.0.0.1:5432/riviamigo_smoke
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations on fresh DB
        run: cargo sqlx migrate run

      - name: Verify migration idempotency (re-run should no-op)
        run: cargo sqlx migrate run

      - name: Start API and probe health
        run: |
          REDIS_URL=redis://localhost:6379 cargo run &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health; then
              echo "Health check passed"
              kill $API_PID
              exit 0
            fi
            sleep 2
          done
          echo "Health check timed out"
          kill $API_PID
          exit 1
