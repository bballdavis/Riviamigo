name: Publish release image

on:
  push:
    tags:
      - '[0-9]*'

env:
  REGISTRY: ghcr.io
  OWNER: bballdavis

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ ! "$version" =~ ^[0-9]{4}\.(0[1-9]|1[0-2])\.[0-9]+$ ]]; then
            echo "Release tags must use YYYY.MM.PATCH; received $version" >&2
            exit 1
          fi
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          echo "version=$version" >> "$GITHUB_OUTPUT"

  image:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./compose/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo:${{ needs.validate-tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo:latest
          cache-from: type=gha,scope=riviamigo-container-image
          cache-to: type=gha,mode=max,scope=riviamigo-container-image
          labels: |
            org.opencontainers.image.source=https://github.com/bballdavis/Riviamigo
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate-tag.outputs.version }}
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-smoke:
    needs: [validate-tag, image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Authenticate release smoke test to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Create ephemeral production environment
        run: |
          smoke_env="$RUNNER_TEMP/release-smoke.env"
          cp compose/.env.example "$smoke_env"
          sed -i 's|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=release-smoke-password|' "$smoke_env"
          sed -i 's|REDIS_PASSWORD=.*|REDIS_PASSWORD=release-smoke-redis-password|' "$smoke_env"
          sed -i 's|ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://release-smoke.example.test|' "$smoke_env"
          echo "RELEASE_SMOKE_ENV=$smoke_env" >> "$GITHUB_ENV"
      - name: Exercise published image-only stack
        run: node scripts/verify-fresh-install.mjs --mode production --production-env "$RELEASE_SMOKE_ENV" --image-tag "${{ needs.validate-tag.outputs.version }}"

  create-release:
    needs: [validate-tag, image, release-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify published multi-architecture image
        run: docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.OWNER }}/riviamigo@${{ needs.image.outputs.digest }}"
      - name: Create digest lock and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
        shell: bash
        run: |
          echo "ghcr.io/bballdavis/riviamigo@${IMAGE_DIGEST}" > images.lock
          gh release create "$VERSION" images.lock#images.lock --title "$VERSION" --generate-notes
