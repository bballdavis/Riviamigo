name: Quality

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  PNPM_VERSION: '11.5.1'
  NODE_VERSION: '20'

jobs:
  quality:
    name: Lint, hygiene, docs, and drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Reject generated state and duplicate lockfiles
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -E '(^|/)(\.codex|\.claude|node_modules|target|dist|coverage|\.turbo|\.playwright-cli)(/|$)|(^|/)package-lock\.json$|(^|/)[^/]+\.tmp$' || true)
          if [[ -n "$forbidden" ]]; then
            echo "Generated or local-only files are tracked:"
            echo "$forbidden"
            exit 1
          fi
          echo "Repository hygiene check passed"
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm turbo lint
      - name: Color-token guard
        shell: bash
        run: |
          set +e
          VIOLATIONS=$(grep -rn \
            --include="*.tsx" --include="*.ts" --include="*.css" \
            -E '#[0-9a-fA-F]{3,8}|rgb\(|rgba\(|text-(blue|indigo|sky|green|red|orange|yellow|slate|zinc|stone)-[0-9]+|bg-(blue|indigo|sky|green|red|orange|yellow|slate|zinc|stone)-[0-9]+' \
            apps/web/src packages/ui/src packages/dashboards/src packages/hooks/src \
            --exclude-dir=node_modules \
            | grep -v 'tokens/colors\.ts\|globals\.css\|\.test\.\|\.spec\.\|//.*#' \
            | grep -v 'getPropertyValue\|CHART_COLORS\|rm-map-route' \
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "Color-token violations found â€” use design tokens instead of raw colors:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No color-token violations"
      - name: Docs check
        run: pnpm docs:check
      - name: Detect documentation-site changes
        id: docs-changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git diff --quiet "$BASE_SHA" HEAD -- \
            docs apps/docs packages/ui/src/tokens README.md AGENTS.md CLAUDE.md \
            package.json pnpm-lock.yaml pnpm-workspace.yaml turbo.json \
            scripts/check-docs.mjs .github/workflows/publish-docs.yml .github/workflows/quality.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build documentation site
        if: steps.docs-changes.outputs.changed == 'true'
        run: pnpm docs:build
      - name: Dashboard default drift check
        run: pnpm dashboards:sync-defaults --check
