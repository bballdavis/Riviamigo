name: PR Backend

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Checks
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.28.3-pg18@sha256:2c718e700b1c75b93488085596f2254c991c3aa29584fc282ebbe62fd8335791
        env:
          POSTGRES_DB: riviamigo
          POSTGRES_USER: riviamigo
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U riviamigo -d riviamigo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://riviamigo:devpassword@127.0.0.1:5432/riviamigo
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify migration integrity
        working-directory: .
        run: node tools/migration-integrity.mjs --base-ref "${GITHUB_BASE_SHA:-}"
      - name: Verify repository whitespace
        working-directory: .
        run: git diff --check "${GITHUB_BASE_SHA:-HEAD^}"...HEAD
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: apps/api
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked
      - name: Format
        run: cargo fmt --all --check
      - name: Run migrations for SQLx metadata validation
        run: cargo sqlx migrate run
      - name: Check sqlx offline metadata
        run: cargo sqlx prepare --check --workspace -- --all-targets --all-features
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all --all-features
