version: 2
updates:
  - package-ecosystem: cargo
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    # Routine version updates are handled intentionally during maintenance windows.
    # Keep Dependabot focused on security fixes.
    open-pull-requests-limit: 0
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - rust

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 0
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /compose
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 0
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 0
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    labels:
      - dependencies
      - docker
