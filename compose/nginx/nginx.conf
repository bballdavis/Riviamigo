# Riviamigo internal origin configuration.
# An authenticated tunnel or identity-aware reverse proxy terminates public TLS
# and targets this private listener; Riviamigo itself is not Internet-facing.

# The master starts as root so nginx can open container log streams, then
# workers run as the unprivileged application user.
user riviamigo;
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Logging — intentionally excludes Authorization and Sec-WebSocket-Protocol
    # headers. The WS auth uses bearer tokens in the subprotocol field; those
    # must not appear in access logs. The uri field contains only path+query
    # (no credentials), so this format is safe to retain long-term.
    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,'
        '"referrer":"$http_referer","ua":"$http_user_agent",'
        '"request_id":"$http_x_request_id","duration":$request_time}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=60r/m;
    # Coarse global API guard; finer read/write/user limits happen in the app.
    limit_req_zone $binary_remote_addr zone=api:10m rate=3600r/m;
    # Live endpoints are intentionally chatty; keep a separate coarse guard.
    limit_req_zone $binary_remote_addr zone=heavy_live:10m rate=1800r/m;

    # Private origin listener. The outer gateway owns public TLS, identity
    # enforcement, and trusted-client-IP handling.
    server {
        listen 8080;
        server_name _;
        set $riviamigo_api http://127.0.0.1:3001;

        error_page 429 = @rate_limited;

        location @rate_limited {
            internal;
            default_type application/json;
            add_header X-Riviamigo-RateLimit-Source "nginx" always;
            add_header X-Riviamigo-RateLimit-Class "edge_api" always;
            add_header Retry-After "1" always;
            return 429 '{"error":{"code":"RATE_LIMITED","message":"Rate limit exceeded","source":"nginx"}}';
        }


        # Body size limit (API handles per-route, this is a hard outer limit)
        client_max_body_size 10m;

        # Security headers (belt-and-suspenders with what Axum sends)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        # Auth endpoints — strict rate limit
        location ~ ^/v1/auth/(login|register|refresh) {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         $riviamigo_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Live/session endpoints (coarse edge guard; app enforces identity quotas)
        location ~ ^/v1/vehicles/[^/]+/live-session$ {
            limit_req zone=heavy_live burst=180 nodelay;
            limit_req_status 429;
            proxy_pass         $riviamigo_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Stream recovery uploads directly to the API-owned backup volume.
        # There is no artificial package-size cap; filesystem capacity is the
        # practical safety boundary and the API cleans interrupted uploads.
        location = /v1/admin/backups/imports {
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass         $riviamigo_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # The restore supervisor remains available while the API process is
        # intentionally stopped. Job capability tokens gate status reads.
        location ^~ /v1/restore-runtime/ {
            limit_req zone=api burst=360 nodelay;
            limit_req_status 429;
            proxy_pass         http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # API endpoints
        location ^~ /v1/ {
            limit_req zone=api burst=360 nodelay;
            limit_req_status 429;
            proxy_pass         $riviamigo_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass $riviamigo_api;
        }

        # Packaged vehicle fallbacks are public web assets. Keep them on the
        # static origin and fail missing files with a real 404 instead of the
        # SPA shell, which an <img> would otherwise decode as a broken image.
        location ^~ /vehicle-images/fallbacks/ {
            root /app/dist;
            try_files $uri =404;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # SPA static files
        location / {
            root  /app/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Versioned assets (cache forever)
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            root    /app/dist;
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
