services:
  app:
    image: ${RIVIAMIGO_IMAGE_REGISTRY:-ghcr.io/bballdavis}/riviamigo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${RIVIAMIGO_ENV_FILE:-../.env}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${RIVIAMIGO_ORIGIN_PORT:-8080}:8080"
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ../data/backups:/backups
      - ../data/cache:/data/cache
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 640M
        reservations:
          memory: 160M

  timescaledb:
    image: timescale/timescaledb:2.26.3-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: riviamigo
      POSTGRES_USER: ${POSTGRES_USER:-riviamigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA: /db
    volumes:
      - ../data/db:/db
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riviamigo} -d riviamigo"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - ../data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
